<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>CercaCarico</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
      --border: #2d2d2d; --accent: #F59E0B;
      --success: #22C55E; --error: #EF4444;
      --text: #E5E5E5; --text-dim: #777;
      --nav-h: 64px; --top-h: 56px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', system-ui, sans-serif; display: flex; flex-direction: column; height: 100dvh; }

    /* TOPBAR */
    .topbar { height: var(--top-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; color: var(--accent); }
    .logo span { color: var(--text-dim); font-weight: 400; }
    .top-stats { margin-left: auto; font-size: 13px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

    /* LAYOUT */
    .content { flex: 1; overflow-y: auto; padding-bottom: var(--nav-h); }
    .nav { height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; padding-bottom: env(safe-area-inset-bottom); }
    .nav button { flex: 1; background: none; border: none; color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
    .nav button.active { color: var(--accent); }
    .nav button svg { width: 22px; height: 22px; }
    .tab { display: none; }
    .tab.active { display: block; }
    #scan-tab { display: none; flex-direction: column; }
    #scan-tab.active { display: flex; height: calc(100dvh - var(--top-h) - var(--nav-h)); }

    /* SECTION HEADER */
    .section-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 2; }
    .section-title { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
    .btn-add { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 8px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; }

    /* EMPTY STATE */
    .empty-state { padding: 56px 24px; text-align: center; color: var(--text-dim); }
    .empty-state .icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { font-size: 16px; line-height: 1.6; }

    /* CARICO CARD */
    .carico-card { margin: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
    .carico-card:active { border-color: var(--accent); }
    .carico-badge { background: var(--accent); color: #000; font-size: 20px; font-weight: 800; min-width: 50px; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .carico-info { flex: 1; min-width: 0; }
    .ci-label { font-size: 11px; color: var(--text-dim); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .ci-count { font-size: 18px; font-weight: 700; margin-top: 1px; }
    .ci-codes { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-arrow { color: var(--text-dim); flex-shrink: 0; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: flex-end; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); width: 100%; max-height: 92dvh; overflow-y: auto; padding: 16px 16px 40px; }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .modal h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .modal-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }

    /* MODE TOGGLE (foto / manuale) */
    .mode-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; margin-bottom: 16px; }
    .mode-btn { flex: 1; background: none; border: none; border-radius: 6px; padding: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .mode-btn.active { background: var(--accent); color: #000; }

    /* FIELDS */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; }
    .field input[type="number"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; color: var(--text); outline: none; }
    .field input:focus { border-color: var(--accent); }

    /* PHOTO */
    .photo-zone { background: var(--bg); border: 2px dashed var(--border); border-radius: 10px; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; overflow: hidden; position: relative; }
    .photo-zone img { width: 100%; height: 160px; object-fit: cover; }
    .pz-label { font-size: 14px; color: var(--text-dim); font-weight: 600; }
    .photo-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* OCR */
    .ocr-progress { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 8px; }
    .ocr-label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
    .progress-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.2s; width: 0%; }

    /* CODES BOX */
    .analysis-area { margin-top: 8px; }
    .status-msg { font-size: 13px; color: var(--text-dim); padding: 10px 0; }
    .codes-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-top: 8px; overflow: hidden; }
    .codes-header { padding: 10px 12px; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); }
    .code-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .code-row:last-child { border-bottom: none; }
    .c-icon { color: var(--success); font-size: 14px; }
    .c-text { flex: 1; }
    .c-del { background: none; border: none; color: var(--error); cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; }

    /* MANUAL FAST-ENTRY */
    .fast-entry { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 0; }
    .fast-entry-hint { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; line-height: 1.4; }
    .fast-row { display: flex; gap: 8px; }
    .fast-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--text); outline: none; }
    .fast-row input:focus { border-color: var(--accent); }
    .btn-fast-add { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 10px 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; }

    /* ADD ROW (in review + edit) */
    .add-row { display: flex; gap: 8px; margin-top: 10px; }
    .add-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text); outline: none; }
    .add-row input:focus { border-color: var(--accent); }
    .btn-add-code { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 9px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); cursor: pointer; }

    /* BUTTONS */
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .btn-confirm { flex: 1; background: var(--success); color: #000; border: none; border-radius: 10px; padding: 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
    .btn-confirm:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; }
    .btn-danger { background: rgba(239,68,68,0.12); color: var(--error); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 14px 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; }
    .btn-next { width: 100%; background: transparent; border: 1px solid var(--accent); border-radius: 10px; padding: 13px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 1px; color: var(--accent); cursor: pointer; text-transform: uppercase; margin-top: 10px; }

    /* SAVED BANNER */
    .saved-banner { text-align: center; padding: 28px 16px; }
    .sb-icon { font-size: 44px; margin-bottom: 10px; }
    .sb-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .sb-sub { font-size: 15px; color: var(--text-dim); margin-bottom: 24px; }

    /* WARN */
    .warn-box { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); border-radius: 8px; padding: 10px 12px; margin-top: 8px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }

    /* DIVIDER */
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* SCAN */
    .scan-wrap { position: relative; flex: 1; overflow: hidden; background: #000; }
    #scan-video { width: 100%; height: 100%; object-fit: cover; display: none; }
    #scan-canvas { display: none; }
    .scan-ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .scan-frame-box { width: 210px; height: 210px; position: relative; }
    .corner { position: absolute; width: 26px; height: 26px; border-color: var(--accent); border-style: solid; }
    .corner.tl { top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0; }
    .corner.tr { top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0; }
    .corner.bl { bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px; }
    .corner.br { bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0; }
    .scan-line { position: absolute; left:3px; right:3px; height:2px; background: linear-gradient(90deg,transparent,var(--accent),transparent); animation: scanAnim 2s ease-in-out infinite; top:50%; }
    @keyframes scanAnim { 0%{transform:translateY(-100px);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateY(100px);opacity:0} }
    .scan-hint { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
    .btn-avvia { background: var(--accent); color: #000; border: none; border-radius: 50%; width: 90px; height: 90px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .btn-avvia svg { width: 28px; height: 28px; }
    .result-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .result-overlay.found    { background: rgba(34,197,94,0.94); opacity:1; pointer-events:all; }
    .result-overlay.notfound { background: rgba(239,68,68,0.94);  opacity:1; pointer-events:all; }
    .res-label  { font-size: 16px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,0,0,0.5); }
    .res-number { font-size: 108px; font-weight: 800; color: #000; line-height: 1; letter-spacing: -3px; }
    .res-code   { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(0,0,0,0.45); }
    .res-tap    { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(0,0,0,0.35); margin-top: 8px; }

    /* LOG */
    .log-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .log-badge { font-size: 15px; font-weight: 800; min-width: 42px; height: 42px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .log-badge.found    { background: rgba(34,197,94,0.12); color: var(--success); }
    .log-badge.notfound { background: rgba(239,68,68,0.12);  color: var(--error); font-size: 22px; }
    .log-details { flex: 1; min-width: 0; }
    .log-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-time { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .btn-clear-log { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-dim); cursor: pointer; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="logo">CERCA<span>CARICO</span></span>
    <span class="top-stats" id="top-stats">-- piani</span>
  </div>

  <!-- PIANI -->
  <div id="piani-tab" class="tab content active">
    <div class="section-header">
      <span class="section-title">Piani di carico</span>
      <button class="btn-add" onclick="openAddModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Aggiungi piano
      </button>
    </div>
    <div id="piani-list"></div>
  </div>

  <!-- SCAN -->
  <div id="scan-tab" class="tab">
    <div class="scan-wrap">
      <video id="scan-video" playsinline autoplay muted></video>
      <canvas id="scan-canvas"></canvas>
      <div class="scan-ui">
        <div id="scan-frame-box" class="scan-frame-box" style="display:none">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div class="scan-line"></div>
        </div>
        <div id="scan-hint" class="scan-hint" style="display:none">Punta il QR code della cassa</div>
        <button class="btn-avvia" id="btn-avvia" onclick="startScan()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          AVVIA
        </button>
      </div>
      <div class="result-overlay" id="result-overlay" onclick="dismissResult()">
        <div class="res-label">CARICO</div>
        <div class="res-number" id="res-number">--</div>
        <div class="res-code"   id="res-code"></div>
        <div class="res-tap">Tocca per continuare</div>
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div id="log-tab" class="tab content">
    <div class="section-header">
      <span class="section-title">Storico scansioni</span>
      <button class="btn-clear-log" onclick="clearLog()">Cancella tutto</button>
    </div>
    <div id="log-list"></div>
  </div>

  <nav class="nav">
    <button class="active" id="nav-piani" onclick="showTab('piani')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      PIANI
    </button>
    <button id="nav-scan" onclick="showTab('scan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      SCANSIONA
    </button>
    <button id="nav-log" onclick="showTab('log')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      LOG
    </button>
  </nav>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div id="modal-body"></div>
    </div>
  </div>

<script>
// ============================================================
// STATE
// ============================================================
var carichi      = {};
var scanLog      = [];
var scanning     = false;
var scanStream   = null;
var scanRaf      = null;
var pendingCodes = [];
var inputMode    = 'foto';   // 'foto' | 'manuale'
var editingKey   = null;     // chiave del carico aperto in modifica

// ============================================================
// INIT / SAVE
// ============================================================
function init() {
  carichi = JSON.parse(localStorage.getItem('cc_carichi') || '{}');
  scanLog = JSON.parse(localStorage.getItem('cc_log')     || '[]');
  renderPiani();
  renderLog();
  updateStats();
}
function save() {
  localStorage.setItem('cc_carichi', JSON.stringify(carichi));
  localStorage.setItem('cc_log',     JSON.stringify(scanLog));
}

// ============================================================
// TABS
// ============================================================
function showTab(name) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.nav button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById(name + '-tab').classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name !== 'scan') stopScan();
}
function updateStats() {
  var np = Object.keys(carichi).length;
  var nc = Object.values(carichi).reduce(function(s,a){ return s + a.length; }, 0);
  document.getElementById('top-stats').textContent =
    np === 0 ? '-- piani' : np + ' piani \u00B7 ' + nc + ' casse';
}

// ============================================================
// PIANI LIST
// ============================================================
function renderPiani() {
  var el = document.getElementById('piani-list');
  var keys = Object.keys(carichi).sort(function(a,b){ return Number(a)-Number(b); });
  if (keys.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>Nessun piano caricato.<br>Aggiungi i piani prima di scansionare.</p></div>';
    return;
  }
  el.innerHTML = keys.map(function(k) {
    var codes = carichi[k];
    var preview = codes.slice(0,3).join(', ') + (codes.length > 3 ? ' +' + (codes.length-3) + ' altri' : '');
    return '<div class="carico-card" onclick="openEditModal(\'' + k + '\')">' +
      '<div class="carico-badge">' + k + '</div>' +
      '<div class="carico-info">' +
        '<div class="ci-label">Carico</div>' +
        '<div class="ci-count">' + codes.length + ' cass' + (codes.length===1?'a':'e') + '</div>' +
        '<div class="ci-codes">' + preview + '</div>' +
      '</div>' +
      '<div class="card-arrow">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
        '<polyline points="9 18 15 12 9 6"/></svg>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ============================================================
// MODAL HELPERS
// ============================================================
function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  pendingCodes = [];
  editingKey   = null;
  inputMode    = 'foto';
}

// ============================================================
// ADD MODAL (nuovo piano)
// ============================================================
function openAddModal() {
  pendingCodes = [];
  inputMode    = 'foto';
  editingKey   = null;
  renderAddStep1();
  openModal();
}

function renderAddStep1() {
  document.getElementById('modal-body').innerHTML =
    '<h2>Aggiungi piano di carico</h2>' +
    '<div class="field">' +
    '<label>Numero carico (scritto sul foglio)</label>' +
    '<input type="number" id="inp-num" placeholder="es. 3" min="1" inputmode="numeric">' +
    '</div>' +
    '<label style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:7px">Modalita di inserimento commesse</label>' +
    '<div class="mode-toggle">' +
    '<button class="mode-btn ' + (inputMode==='foto'?'active':'') + '" onclick="switchMode(\'foto\')">📷 Foto OCR</button>' +
    '<button class="mode-btn ' + (inputMode==='manuale'?'active':'') + '" onclick="switchMode(\'manuale\')">✏️ Manuale</button>' +
    '</div>' +
    '<div id="mode-content"></div>' +
    '<div id="analysis-area"></div>' +
    '<div class="modal-actions">' +
    '<button class="btn-secondary" onclick="closeModal()">Annulla</button>' +
    '<button class="btn-confirm" id="btn-save-piano" disabled onclick="savePiano()">Salva carico</button>' +
    '</div>';
  renderModeContent();
}

function switchMode(m) {
  inputMode = m;
  pendingCodes = [];
  document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.remove('active'); });
  var btns = document.querySelectorAll('.mode-btn');
  if (m === 'foto') { btns[0].classList.add('active'); } else { btns[1].classList.add('active'); }
  document.getElementById('analysis-area').innerHTML = '';
  var btn = document.getElementById('btn-save-piano');
  if (btn) btn.disabled = true;
  renderModeContent();
}

function renderModeContent() {
  var el = document.getElementById('mode-content');
  if (inputMode === 'foto') {
    el.innerHTML =
      '<div class="field" style="margin-bottom:8px"><label>Fotografa la lista di carico</label>' +
      '<div class="photo-zone" id="photo-zone">' +
      '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">' +
      '<path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>' +
      '<circle cx="12" cy="13" r="4"/></svg>' +
      '<span class="pz-label">Tocca per fotografare</span>' +
      '<input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event)">' +
      '</div></div>' +
      '<div class="warn-box">Prima lettura: scarica motore OCR (~5 MB, una sola volta). Le successive sono immediate.</div>';
  } else {
    el.innerHTML =
      '<div class="fast-entry">' +
      '<div class="fast-entry-hint">Digita un codice e premi Aggiungi (o Invio) per inserirlo. Ripeti per tutte le commesse del piano.</div>' +
      '<div class="fast-row">' +
      '<input type="text" id="inp-fast" placeholder="Es. 243182" inputmode="text" onkeydown="if(event.key===\'Enter\')fastAdd()">' +
      '<button class="btn-fast-add" onclick="fastAdd()">Aggiungi</button>' +
      '</div>' +
      '</div>';
    // Se ci sono gia codici pendenti mostrali subito
    if (pendingCodes.length > 0) renderCodesReview();
    // Autofocus sul campo
    setTimeout(function(){ var f = document.getElementById('inp-fast'); if(f) f.focus(); }, 100);
  }
}

function fastAdd() {
  var inp = document.getElementById('inp-fast');
  var v = (inp ? inp.value.trim() : '');
  if (!v) return;
  pendingCodes.push(v);
  inp.value = '';
  inp.focus();
  renderCodesReview();
  var btn = document.getElementById('btn-save-piano');
  if (btn) btn.disabled = false;
}

// ============================================================
// PHOTO + OCR
// ============================================================
function handlePhoto(evt) {
  var file = evt.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    document.getElementById('photo-zone').innerHTML = '<img src="' + dataUrl + '">';
    runOCR(dataUrl);
  };
  reader.readAsDataURL(file);
}

function runOCR(dataUrl) {
  var area = document.getElementById('analysis-area');
  area.innerHTML =
    '<div class="ocr-progress">' +
    '<div class="ocr-label" id="ocr-label">Lettura testo in corso...</div>' +
    '<div class="progress-bar-wrap"><div class="progress-bar" id="ocr-bar"></div></div>' +
    '</div>';

  Tesseract.recognize(dataUrl, 'ita', {
    logger: function(m) {
      if (m.status === 'recognizing text') {
        var pct = Math.round((m.progress || 0) * 100);
        var bar = document.getElementById('ocr-bar');
        var lbl = document.getElementById('ocr-label');
        if (bar) bar.style.width = pct + '%';
        if (lbl) lbl.textContent = 'Lettura testo... ' + pct + '%';
      }
    }
  }).then(function(result) {
    pendingCodes = parseCodesFromOCR(result.data.text);
    renderCodesReview();
  }).catch(function(err) {
    document.getElementById('analysis-area').innerHTML =
      '<div class="status-msg" style="color:var(--error)">Errore: ' + err.message + '<br>Aggiungi i codici manualmente.</div>';
    pendingCodes = [];
    renderCodesReview();
  });
}

function parseCodesFromOCR(text) {
  var codes = [];
  var seen  = {};
  var lines = text.split('\n');
  var inSection = false;
  var SKIP = /lunghezza|larghezza|altezza|peso|volume|container|pagina|client|job\b|data\b|rif\.|packv|italpacking|filiera|j-track/i;

  for (var i = 0; i < lines.length; i++) {
    var line  = lines[i].trim();
    if (!line) continue;
    var lower = line.toLowerCase();
    if (lower.includes('codice') || lower.includes('lista di carico')) { inSection = true; continue; }
    if (!inSection) continue;
    if (SKIP.test(lower)) continue;
    if (/^\d[\d\s,.]+$/.test(line)) continue;
    if (/^\d{1,2}$/.test(line)) continue;
    var match = line.match(/([A-Z]{1,3}[\s\-]?\d{5,6})/i);
    if (match) {
      var numMatch = match[1].match(/(\d{5,6})/);
      if (numMatch) {
        var num = numMatch[1];
        var posMatch = line.match(/pos\.?\s*(\d+)/i);
        var code = posMatch ? num + '_p' + posMatch[1] : num;
        if (!seen[code]) { seen[code] = true; codes.push(code); }
      }
    }
  }
  if (codes.length === 0) {
    var fb = text.match(/\b(\d{5,6})\b(?![,\.\d])/g);
    if (fb) { fb.forEach(function(n){ if (!seen[n]){ seen[n]=true; codes.push(n); } }); }
  }
  return codes;
}

// ============================================================
// CODES REVIEW (usata sia in add che in edit)
// ============================================================
function renderCodesReview() {
  var area = document.getElementById('analysis-area');
  if (!area) return;

  var codesHtml = pendingCodes.length === 0
    ? '<div style="padding:10px 12px;font-size:13px;color:var(--text-dim)">Nessun codice -- aggiungine uno sopra</div>'
    : pendingCodes.map(function(c, i) {
        return '<div class="code-row">' +
          '<span class="c-icon">✓</span>' +
          '<span class="c-text">' + c + '</span>' +
          '<button class="c-del" onclick="removeCode(' + i + ')">×</button>' +
        '</div>';
      }).join('');

  var addInputId   = inputMode === 'manuale' ? 'inp-fast' : 'inp-extra';
  var addInputHtml = inputMode === 'manuale'
    ? '' // il campo fast-entry e' gia sopra
    : '<div class="add-row">' +
      '<input type="text" id="inp-extra" placeholder="Aggiungi codice..." onkeydown="if(event.key===\'Enter\')addExtra()">' +
      '<button class="btn-add-code" onclick="addExtra()">+ Aggiungi</button>' +
      '</div>';

  area.innerHTML =
    '<div class="codes-box">' +
    '<div class="codes-header">' + pendingCodes.length + ' codici -- verifica e correggi</div>' +
    codesHtml +
    '</div>' +
    addInputHtml;

  var btn = document.getElementById('btn-save-piano');
  if (btn) btn.disabled = (pendingCodes.length === 0);
}

function removeCode(i) {
  pendingCodes.splice(i, 1);
  renderCodesReview();
  var btn = document.getElementById('btn-save-piano');
  if (btn) btn.disabled = (pendingCodes.length === 0);
}

// Campo aggiuntivo nella modalita' foto (dopo OCR)
function addExtra() {
  var inp = document.getElementById('inp-extra');
  var v = (inp ? inp.value.trim() : '');
  if (!v) return;
  pendingCodes.push(v);
  inp.value = '';
  renderCodesReview();
  var btn = document.getElementById('btn-save-piano');
  if (btn) btn.disabled = false;
}

function savePiano() {
  var numEl = document.getElementById('inp-num');
  var num = numEl ? numEl.value.trim() : '';
  if (!num) { alert('Inserisci il numero del carico'); return; }
  if (pendingCodes.length === 0) { alert('Nessun codice da salvare'); return; }
  if (carichi[num] && !confirm('Il Carico ' + num + ' esiste gia. Sostituire?')) return;

  carichi[num] = pendingCodes.slice();
  save(); renderPiani(); updateStats();
  var count = pendingCodes.length;
  pendingCodes = [];

  document.getElementById('modal-body').innerHTML =
    '<div class="saved-banner">' +
    '<div class="sb-icon">✅</div>' +
    '<div class="sb-title">Carico ' + num + ' salvato</div>' +
    '<div class="sb-sub">' + count + ' casse registrate</div>' +
    '<button class="btn-next" onclick="openAddModal()">➕ Aggiungi prossimo piano</button>' +
    '<div class="modal-actions"><button class="btn-confirm" style="margin-top:0" onclick="closeModal()">Ho finito</button></div>' +
    '</div>';
}

// ============================================================
// EDIT MODAL (piano esistente)
// ============================================================
function openEditModal(k) {
  editingKey   = k;
  pendingCodes = carichi[k].slice();
  inputMode    = 'manuale';
  renderEditView();
  openModal();
}

function renderEditView() {
  var k     = editingKey;
  var codes = pendingCodes;

  var codesHtml = codes.length === 0
    ? '<div style="padding:10px 12px;font-size:13px;color:var(--text-dim)">Nessuna commessa</div>'
    : codes.map(function(c, i) {
        return '<div class="code-row">' +
          '<span class="c-icon">✓</span>' +
          '<span class="c-text">' + c + '</span>' +
          '<button class="c-del" onclick="editRemoveCode(' + i + ')">×</button>' +
        '</div>';
      }).join('');

  document.getElementById('modal-body').innerHTML =
    '<h2>Carico ' + k + '</h2>' +
    '<div class="modal-sub">' + codes.length + ' commess' + (codes.length===1?'a':'e') + ' registrate</div>' +
    '<div class="codes-box">' +
    '<div class="codes-header">Elenco commesse</div>' +
    codesHtml +
    '</div>' +
    '<div class="add-row" style="margin-top:10px">' +
    '<input type="text" id="inp-edit-add" placeholder="Aggiungi commessa..." onkeydown="if(event.key===\'Enter\')editAddCode()">' +
    '<button class="btn-add-code" onclick="editAddCode()">+ Aggiungi</button>' +
    '</div>' +
    '<hr class="divider">' +
    '<div class="modal-actions">' +
    '<button class="btn-danger" onclick="editDeleteCarico()">Elimina</button>' +
    '<button class="btn-secondary" onclick="closeModal()">Chiudi</button>' +
    '<button class="btn-confirm" onclick="editSave()">Salva</button>' +
    '</div>';
}

function editRemoveCode(i) {
  pendingCodes.splice(i, 1);
  renderEditView();
}

function editAddCode() {
  var inp = document.getElementById('inp-edit-add');
  var v = (inp ? inp.value.trim() : '');
  if (!v) return;
  pendingCodes.push(v);
  inp.value = '';
  renderEditView();
  // Riporta focus al campo
  setTimeout(function(){ var f = document.getElementById('inp-edit-add'); if(f) f.focus(); }, 50);
}

function editSave() {
  if (pendingCodes.length === 0) { alert('Il carico non puo essere vuoto'); return; }
  carichi[editingKey] = pendingCodes.slice();
  save(); renderPiani(); updateStats(); closeModal();
}

function editDeleteCarico() {
  if (!confirm('Eliminare il Carico ' + editingKey + '?')) return;
  delete carichi[editingKey];
  save(); renderPiani(); updateStats(); closeModal();
}

// ============================================================
// SCAN
// ============================================================
async function startScan() {
  if (Object.keys(carichi).length === 0) {
    alert('Carica almeno un piano prima di scansionare.');
    showTab('piani'); return;
  }
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }
    });
    var video = document.getElementById('scan-video');
    video.srcObject = scanStream;
    video.style.display = 'block';
    document.getElementById('btn-avvia').style.display = 'none';
    document.getElementById('scan-frame-box').style.display = 'block';
    document.getElementById('scan-hint').style.display = 'block';
    scanning = true;
    tick();
  } catch(e) { alert('Fotocamera non accessibile: ' + e.message); }
}
function stopScan() {
  scanning = false;
  if (scanRaf) { cancelAnimationFrame(scanRaf); scanRaf = null; }
  if (scanStream) { scanStream.getTracks().forEach(function(t){ t.stop(); }); scanStream = null; }
  var video = document.getElementById('scan-video');
  if (video) { video.srcObject = null; video.style.display = 'none'; }
  var btn = document.getElementById('btn-avvia');       if (btn) btn.style.display = '';
  var fb  = document.getElementById('scan-frame-box'); if (fb)  fb.style.display = 'none';
  var sh  = document.getElementById('scan-hint');       if (sh)  sh.style.display = 'none';
}
function tick() {
  if (!scanning) return;
  var video  = document.getElementById('scan-video');
  var canvas = document.getElementById('scan-canvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var qr  = jsQR(img.data, img.width, img.height);
    if (qr) { onQR(qr.data); return; }
  }
  scanRaf = requestAnimationFrame(tick);
}
function onQR(url) {
  scanning = false;
  if (scanRaf) cancelAnimationFrame(scanRaf);
  var id     = extractId(url);
  var carico = id ? lookup(id) : null;
  var overlay = document.getElementById('result-overlay');
  if (navigator.vibrate) navigator.vibrate(carico ? [80] : [80,60,80]);
  if (carico) {
    overlay.className = 'result-overlay found';
    document.getElementById('res-number').textContent = carico;
    document.getElementById('res-code').textContent   = id;
  } else {
    overlay.className = 'result-overlay notfound';
    document.getElementById('res-number').textContent = '?';
    document.getElementById('res-code').textContent   = id || url.substring(0,36);
  }
  scanLog.unshift({ t: new Date().toISOString(), code: id || url, carico: carico });
  if (scanLog.length > 300) scanLog = scanLog.slice(0, 300);
  save(); renderLog();
}
function dismissResult() {
  document.getElementById('result-overlay').className = 'result-overlay';
  scanning = true; tick();
}
function extractId(url) {
  var m = url.match(/\/(\d{4,})\/?$/);
  return m ? m[1] : null;
}
function lookup(id) {
  var idClean = id.replace(/^0+/, '');
  for (var carico in carichi) {
    var codes = carichi[carico];
    for (var i = 0; i < codes.length; i++) {
      var c = codes[i];
      var nums = c.replace(/[^0-9]/g, '').replace(/^0+/, '');
      if (nums === idClean || c.indexOf(id) !== -1) return carico;
    }
  }
  return null;
}

// ============================================================
// LOG
// ============================================================
function renderLog() {
  var el = document.getElementById('log-list');
  if (scanLog.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>Nessuna scansione ancora.</p></div>';
    return;
  }
  el.innerHTML = scanLog.map(function(entry) {
    var d  = new Date(entry.t);
    var ts = d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}) + ' ' +
             d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    return '<div class="log-item">' +
      '<div class="log-badge ' + (entry.carico ? 'found' : 'notfound') + '">' +
        (entry.carico ? entry.carico : '\u00D7') +
      '</div>' +
      '<div class="log-details">' +
        '<div class="log-code">' + entry.code + '</div>' +
        '<div class="log-time">' + ts + (entry.carico ? ' \u00B7 Carico ' + entry.carico : ' \u00B7 Non trovato') + '</div>' +
      '</div></div>';
  }).join('');
}
function clearLog() {
  if (confirm('Cancellare tutto lo storico?')) { scanLog = []; save(); renderLog(); }
}

// ============================================================
// START
// ============================================================
init();
</script>
